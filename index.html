<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Конституция Узбекистана — Поиск</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f0e8;
    --card: #fffdf8;
    --accent: #1a4a2e;
    --gold: #c8963e;
    --text: #1c1c1c;
    --muted: #6b6b5e;
    --border: #e0d9cc;
    --highlight: #fff3cd;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    font-family: 'IBM Plex Sans', sans-serif;
    color: var(--text);
    min-height: 100vh;
  }
  header {
    background: var(--accent);
    color: white;
    padding: 32px 24px 24px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '';
    position: absolute;
    top: -60px; left: -60px;
    width: 200px; height: 200px;
    border: 2px solid rgba(200,150,62,0.3);
    border-radius: 50%;
  }
  header::after {
    content: '';
    position: absolute;
    bottom: -40px; right: -40px;
    width: 140px; height: 140px;
    border: 2px solid rgba(200,150,62,0.2);
    border-radius: 50%;
  }
  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    font-weight: 700;
    letter-spacing: 0.5px;
    position: relative;
  }
  header p {
    margin-top: 6px;
    font-size: 13px;
    color: rgba(255,255,255,0.65);
    font-weight: 300;
    position: relative;
  }
  .gold-line {
    width: 60px; height: 2px;
    background: var(--gold);
    margin: 14px auto 0;
    position: relative;
  }

  .search-wrap {
    max-width: 720px;
    margin: 28px auto 0;
    padding: 0 16px;
  }
  .search-box {
    display: flex;
    align-items: center;
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 0 16px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .search-box:focus-within {
    border-color: var(--accent);
    box-shadow: 0 2px 20px rgba(26,74,46,0.12);
  }
  .search-box svg { flex-shrink: 0; color: var(--muted); }
  .search-box input {
    flex: 1;
    border: none;
    outline: none;
    background: transparent;
    padding: 14px 12px;
    font-size: 15px;
    font-family: 'IBM Plex Sans', sans-serif;
    color: var(--text);
  }
  .search-box input::placeholder { color: var(--muted); }
  .clear-btn {
    background: none; border: none; cursor: pointer;
    color: var(--muted); font-size: 18px; padding: 4px;
    display: none;
    transition: color 0.15s;
  }
  .clear-btn:hover { color: var(--text); }

  .filters {
    display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap;
  }
  .filter-btn {
    border: 1.5px solid var(--border);
    background: var(--card);
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 12px;
    font-family: 'IBM Plex Sans', sans-serif;
    cursor: pointer;
    color: var(--muted);
    transition: all 0.15s;
    font-weight: 500;
  }
  .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
  .filter-btn.active { background: var(--accent); color: white; border-color: var(--accent); }

  .stats {
    max-width: 720px;
    margin: 16px auto 0;
    padding: 0 16px;
    font-size: 12px;
    color: var(--muted);
  }

  .results {
    max-width: 720px;
    margin: 16px auto 32px;
    padding: 0 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  /* ── CHAPTER HEADER ── */
  .chapter-header {
    background: var(--accent);
    color: white;
    border-radius: 10px;
    padding: 14px 18px;
    margin-top: 8px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  .ch-header-left { flex: 1; min-width: 0; }
  .chapter-header .ch-num {
    font-size: 11px;
    color: rgba(255,255,255,0.6);
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .chapter-header .ch-title {
    font-family: 'Playfair Display', serif;
    font-size: 16px;
    margin-top: 3px;
  }
  .ch-read-btn {
    background: rgba(200,150,62,0.2);
    border: 1.5px solid rgba(200,150,62,0.5);
    color: #e8c87a;
    border-radius: 8px;
    padding: 6px 12px;
    font-size: 12px;
    font-family: 'IBM Plex Sans', sans-serif;
    font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .ch-read-btn:hover {
    background: rgba(200,150,62,0.4);
    border-color: var(--gold);
    color: white;
  }

  /* ── ARTICLE CARD ── */
  .article-card {
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 16px 18px;
    cursor: pointer;
    transition: all 0.15s;
    position: relative;
  }
  .article-card:hover {
    border-color: var(--accent);
    box-shadow: 0 3px 14px rgba(26,74,46,0.1);
    transform: translateY(-1px);
  }
  .article-top {
    display: flex;
    align-items: flex-start;
    gap: 12px;
  }
  .art-num {
    background: var(--accent);
    color: white;
    font-size: 11px;
    font-weight: 600;
    padding: 3px 9px;
    border-radius: 6px;
    white-space: nowrap;
    flex-shrink: 0;
    margin-top: 1px;
    letter-spacing: 0.3px;
  }
  .art-summary {
    font-size: 14px;
    color: var(--text);
    line-height: 1.5;
    flex: 1;
    font-weight: 500;
  }
  .art-open-hint {
    font-size: 16px;
    color: var(--muted);
    margin-left: auto;
    flex-shrink: 0;
    margin-top: 1px;
    transition: color 0.15s, transform 0.15s;
  }
  .article-card:hover .art-open-hint { color: var(--accent); transform: translateX(2px); }

  mark {
    background: var(--highlight);
    color: var(--text);
    border-radius: 2px;
    padding: 0 2px;
  }

  .no-results {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }
  .no-results .icon { font-size: 40px; margin-bottom: 12px; }
  .no-results p { font-size: 15px; }

  /* ── MODAL ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(10,28,18,0.6);
    backdrop-filter: blur(4px);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal-overlay.open { display: flex; }
  .modal-box {
    background: var(--card);
    border-radius: 16px;
    width: 100%;
    max-width: 640px;
    max-height: 88vh;
    display: flex;
    flex-direction: column;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    overflow: hidden;
  }
  .modal-header {
    background: var(--accent);
    color: white;
    padding: 16px 20px 14px;
    display: flex;
    align-items: flex-start;
    gap: 12px;
  }
  .modal-header-text { flex: 1; min-width: 0; }
  .modal-chapter-label {
    font-size: 11px;
    color: rgba(255,255,255,0.55);
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .modal-art-num {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    margin-top: 2px;
  }
  .modal-close {
    background: rgba(255,255,255,0.12);
    border: none;
    color: white;
    width: 32px; height: 32px;
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: background 0.15s;
  }
  .modal-close:hover { background: rgba(255,255,255,0.25); }
  .modal-body {
    padding: 20px;
    overflow-y: auto;
    flex: 1;
  }
  .modal-summary {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.55;
    margin-bottom: 16px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }
  .modal-full {
    font-size: 14px;
    color: #3a3a3a;
    line-height: 1.85;
    margin-bottom: 16px;
  }
  .modal-tags { display: flex; flex-wrap: wrap; gap: 6px; }
  .modal-tag {
    background: rgba(26,74,46,0.08);
    color: var(--accent);
    border-radius: 20px;
    padding: 3px 10px;
    font-size: 11px;
    font-weight: 500;
  }
  .modal-footer {
    padding: 12px 20px;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--bg);
  }
  .modal-nav-btn {
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 8px 16px;
    font-size: 13px;
    font-family: 'IBM Plex Sans', sans-serif;
    cursor: pointer;
    color: var(--text);
    font-weight: 500;
    transition: all 0.15s;
    display: flex; align-items: center; gap: 6px;
  }
  .modal-nav-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
  .modal-nav-btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .modal-counter { flex: 1; text-align: center; font-size: 12px; color: var(--muted); }

  /* ── CHAPTER READER ── */
  .reader-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 110;
    flex-direction: column;
  }
  .reader-overlay.open { display: flex; }
  .reader-topbar {
    background: var(--accent);
    color: white;
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-shrink: 0;
  }
  .reader-topbar-text { flex: 1; min-width: 0; }
  .reader-ch-num {
    font-size: 11px;
    color: rgba(255,255,255,0.55);
    text-transform: uppercase;
    letter-spacing: 1px;
    font-weight: 500;
  }
  .reader-ch-title {
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    margin-top: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .reader-close-btn {
    background: rgba(255,255,255,0.12);
    border: none;
    color: white;
    padding: 8px 14px;
    border-radius: 8px;
    font-size: 13px;
    font-family: 'IBM Plex Sans', sans-serif;
    font-weight: 500;
    cursor: pointer;
    flex-shrink: 0;
    transition: background 0.15s;
  }
  .reader-close-btn:hover { background: rgba(255,255,255,0.25); }
  .reader-layout {
    display: flex;
    flex: 1;
    min-height: 0;
  }
  .reader-toc {
    width: 180px;
    flex-shrink: 0;
    background: var(--card);
    border-right: 1.5px solid var(--border);
    overflow-y: auto;
    padding: 12px 0;
  }
  .reader-toc-item {
    display: block;
    padding: 8px 16px;
    font-size: 13px;
    color: var(--muted);
    text-decoration: none;
    font-weight: 500;
    transition: color 0.15s, background 0.15s;
    border-left: 2.5px solid transparent;
    cursor: pointer;
  }
  .reader-toc-item:hover {
    color: var(--accent);
    background: rgba(26,74,46,0.05);
    border-left-color: var(--accent);
  }
  .reader-body {
    flex: 1;
    overflow-y: auto;
    padding: 24px 28px;
    max-width: 740px;
  }
  .reader-article {
    margin-bottom: 36px;
    scroll-margin-top: 20px;
  }
  .reader-art-num {
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    color: var(--accent);
    margin-bottom: 8px;
    font-weight: 700;
  }
  .reader-art-summary {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.55;
    margin-bottom: 10px;
  }
  .reader-art-full {
    font-size: 14px;
    color: #3a3a3a;
    line-height: 1.85;
    margin-bottom: 10px;
    padding: 14px 16px;
    background: rgba(26,74,46,0.04);
    border-left: 3px solid var(--gold);
    border-radius: 0 8px 8px 0;
  }
  .reader-art-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
  .reader-article + .reader-article { padding-top: 28px; border-top: 1px solid var(--border); }

  @media (max-width: 540px) {
    .reader-toc { display: none; }
    .reader-body { padding: 16px; }
    .modal-box { max-height: 92vh; }
    .ch-read-btn span { display: none; }
    header h1 { font-size: 22px; }
    .art-summary { font-size: 13px; }
  }
</style>
</head>
<body>

<header>
  <h1>Конституция Республики Узбекистан</h1>
  <p>Умный поиск по статьям и главам</p>
  <div class="gold-line"></div>
</header>

<div class="search-wrap">
  <div class="search-box">
    <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input type="text" id="searchInput" placeholder="Поиск по слову, номеру статьи или главы…" autocomplete="off">
    <button class="clear-btn" id="clearBtn" title="Очистить">✕</button>
  </div>
  <div class="filters">
    <button class="filter-btn active" data-filter="all">Всё</button>
    <button class="filter-btn" data-filter="chapter">Только главы</button>
    <button class="filter-btn" data-filter="article">Только статьи</button>
    <button class="filter-btn" data-filter="rights">Права и свободы</button>
    <button class="filter-btn" data-filter="economy">Экономика</button>
    <button class="filter-btn" data-filter="duties">Обязанности</button>
  </div>
</div>

<div class="stats" id="stats"></div>
<div class="results" id="results"></div>

<!-- MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal-box">
    <div class="modal-header">
      <div class="modal-header-text">
        <div class="modal-chapter-label" id="modal-chapter"></div>
        <div class="modal-art-num" id="modal-art-num"></div>
      </div>
      <button class="modal-close" id="modal-close">✕</button>
    </div>
    <div class="modal-body">
      <div class="modal-summary" id="modal-art-summary"></div>
      <div class="modal-full" id="modal-art-full"></div>
      <div class="modal-tags" id="modal-tags"></div>
    </div>
    <div class="modal-footer">
      <button class="modal-nav-btn" id="modal-prev">← Пред.</button>
      <span class="modal-counter" id="modal-counter"></span>
      <button class="modal-nav-btn" id="modal-next">След. →</button>
    </div>
  </div>
</div>

<!-- CHAPTER READER -->
<div class="reader-overlay" id="reader">
  <div class="reader-topbar">
    <div class="reader-topbar-text">
      <div class="reader-ch-num" id="reader-chapter-num"></div>
      <div class="reader-ch-title" id="reader-chapter-title"></div>
    </div>
    <button class="reader-close-btn" id="reader-close">✕ Закрыть</button>
  </div>
  <div class="reader-layout">
    <nav class="reader-toc" id="reader-toc"></nav>
    <div class="reader-body" id="reader-body">
      <div id="reader-articles"></div>
    </div>
  </div>
</div>

<script>
const data = [
  { type:'chapter', num:'I', title:'Государственный суверенитет', section:'Основы государственности' },
  { type:'article', num:1, chapter:'I', summary:'Узбекистан — суверенное, демократическое, правовое, социальное и светское государство.', full:'Узбекистан — суверенное, демократическое, правовое, социальное и светское государство с республиканской формой правления. Названия «Республика Узбекистан» и «Узбекистан» равнозначны.', tags:['основы','государство'] },
  { type:'article', num:2, chapter:'I', summary:'Государство служит интересам народа; органы власти ответственны перед обществом.', full:'Государство выражает волю народа, служит его интересам. Государственные органы и должностные лица ответственны перед обществом и гражданами.', tags:['государство','ответственность'] },
  { type:'article', num:3, chapter:'I', summary:'Узбекистан самостоятельно определяет своё устройство и политику; границы неприкосновенны.', full:'Республика Узбекистан определяет национально-государственное и административно-территориальное устройство, систему органов государственной власти, проводит свою внутреннюю и внешнюю политику. Государственная граница и территория Узбекистана неприкосновенны и неделимы.', tags:['территория','суверенитет'] },
  { type:'article', num:4, chapter:'I', summary:'Государственный язык — узбекский. Языки всех народов страны уважаются.', full:'Государственным языком Республики Узбекистан является узбекский язык. Республика обеспечивает уважительное отношение к языкам, обычаям и традициям всех народностей страны.', tags:['язык','культура'] },
  { type:'article', num:5, chapter:'I', summary:'Узбекистан имеет флаг, герб и гимн, охраняемые государством.', full:'Республика Узбекистан имеет свои государственные символы — флаг, герб, гимн, утверждаемые законом. Государственные символы находятся под защитой государства.', tags:['символы'] },
  { type:'article', num:6, chapter:'I', summary:'Столица Республики Узбекистан — Ташкент.', full:'Столица Республики Узбекистан — город Ташкент.', tags:['столица'] },

  { type:'chapter', num:'II', title:'Народовластие', section:'Основы государственности' },
  { type:'article', num:7, chapter:'II', summary:'Народ — единственный источник власти; узурпация власти противоконституционна.', full:'Народ является единственным источником государственной власти. Присвоение полномочий государственной власти является антиконституционным и влечёт ответственность по закону.', tags:['власть','народ'] },
  { type:'article', num:8, chapter:'II', summary:'Народ Узбекистана — все граждане страны независимо от национальности.', full:'Народ Узбекистана составляют граждане Республики Узбекистан независимо от их национальности.', tags:['народ','гражданство'] },
  { type:'article', num:9, chapter:'II', summary:'Важнейшие вопросы выносятся на референдум.', full:'Наиболее важные вопросы общественной и государственной жизни выносятся на обсуждение народа — референдум. Порядок проведения референдума определяется законом.', tags:['референдум','демократия'] },
  { type:'article', num:10, chapter:'II', summary:'От имени народа вправе выступать только Олий Мажлис и Президент.', full:'От имени народа Узбекистана могут выступать только избранные им Олий Мажлис и Президент. Никакая партия или лицо не могут выступать от имени народа.', tags:['власть','парламент','президент'] },
  { type:'article', num:11, chapter:'II', summary:'Власть разделена на законодательную, исполнительную и судебную.', full:'Система государственной власти Республики Узбекистан основывается на принципе разделения властей на законодательную, исполнительную и судебную.', tags:['разделение властей'] },
  { type:'article', num:12, chapter:'II', summary:'Общественная жизнь — на основе многообразия идеологий; государственная идеология запрещена.', full:'В Республике Узбекистан общественная жизнь развивается на основе многообразия политических институтов, идеологий и мнений. Никакая идеология не может устанавливаться в качестве государственной.', tags:['идеология','плюрализм'] },
  { type:'article', num:13, chapter:'II', summary:'Высшая ценность демократии — человек, его жизнь, свобода и достоинство.', full:'Демократия в Республике Узбекистан базируется на принципах, согласно которым высшей ценностью является человек, его жизнь, свобода, честь, достоинство и другие неотъемлемые права.', tags:['демократия','права','достоинство'] },
  { type:'article', num:14, chapter:'II', summary:'Государство действует на принципах законности и социальной справедливости.', full:'Государство осуществляет свою деятельность на принципах законности, социальной справедливости и солидарности в целях обеспечения благосостояния человека и устойчивого развития общества.', tags:['законность','справедливость'] },

  { type:'chapter', num:'III', title:'Верховенство Конституции и закона', section:'Основы государственности' },
  { type:'article', num:15, chapter:'III', summary:'Конституция имеет высшую юридическую силу; международные договоры — часть правовой системы.', full:'В Республике Узбекистан признаётся безусловное верховенство Конституции и законов. Конституция имеет высшую юридическую силу и прямое действие. Международные договоры являются составной частью правовой системы.', tags:['конституция','законность','международное право'] },
  { type:'article', num:16, chapter:'III', summary:'Никакой закон не может противоречить Конституции.', full:'Ни одно из положений Конституции не может толковаться в ущерб правам и интересам Республики. Ни один закон или нормативный акт не может противоречить принципам Конституции.', tags:['конституция','закон'] },

  { type:'chapter', num:'IV', title:'Внешняя политика', section:'Основы государственности' },
  { type:'article', num:17, chapter:'IV', summary:'Узбекистан — полноправный субъект международных отношений; принципы — суверенное равенство и мир.', full:'Республика Узбекистан является полноправным субъектом международных отношений. Внешняя политика основывается на принципах суверенного равенства, неприменения силы, невмешательства во внутренние дела других государств.', tags:['внешняя политика','международные отношения'] },
  { type:'article', num:18, chapter:'IV', summary:'Узбекистан проводит миролюбивую внешнюю политику и может вступать в союзы и содружества.', full:'Республика Узбекистан осуществляет миролюбивую внешнюю политику, развивает двусторонние и многосторонние отношения. Может заключать союзы и входить в межгосударственные образования.', tags:['внешняя политика','союзы'] },

  { type:'chapter', num:'V', title:'Общие положения прав и свобод', section:'Права и свободы' },
  { type:'article', num:19, chapter:'V', summary:'Права и свободы человека признаются от рождения; все равны перед законом.', full:'В Республике Узбекистан признаются и гарантируются права и свободы человека согласно нормам международного права. Все граждане равны перед законом независимо от пола, расы, национальности, языка, религии, убеждений.', tags:['права','равенство','свободы'] },
  { type:'article', num:20, chapter:'V', summary:'Права и свободы незыблемы; гражданин и государство связаны взаимными правами.', full:'Права и свободы человека, закреплённые в Конституции и законах, являются незыблемыми. Права и свободы действуют непосредственно. Все противоречия в законодательстве толкуются в пользу человека.', tags:['права','свободы','гарантии'] },
  { type:'article', num:21, chapter:'V', summary:'Каждый имеет право на свободное развитие личности; права могут ограничиваться только законом.', full:'Каждый человек имеет право на свободное развитие своей личности. Права и свободы могут быть ограничены только в соответствии с законом и лишь в мере, необходимой для защиты конституционного строя и прав других лиц.', tags:['личность','свободы'] },

  { type:'chapter', num:'VI', title:'Гражданство', section:'Права и свободы' },
  { type:'article', num:22, chapter:'VI', summary:'Единое гражданство; гражданин Каракалпакстана — одновременно гражданин Узбекистана.', full:'В Республике Узбекистан устанавливается единое гражданство. Гражданство является равным для всех независимо от оснований его приобретения. Гражданин Республики Каракалпакстан является одновременно гражданином Республики Узбекистан.', tags:['гражданство'] },
  { type:'article', num:23, chapter:'VI', summary:'Государство защищает граждан за рубежом; высылка гражданина запрещена.', full:'Республика Узбекистан гарантирует защиту своим гражданам как на своей территории, так и за её пределами. Гражданин не может быть выслан за пределы Узбекистана или выдан другому государству.', tags:['гражданство','защита'] },
  { type:'article', num:24, chapter:'VI', summary:'Иностранцам и лицам без гражданства обеспечиваются права согласно международному праву.', full:'Иностранным гражданам и лицам без гражданства, находящимся на территории Республики Узбекистан, обеспечиваются права и свободы в соответствии с нормами международного права.', tags:['иностранцы','права'] },

  { type:'chapter', num:'VII', title:'Личные права и свободы', section:'Права и свободы' },
  { type:'article', num:25, chapter:'VII', summary:'Право на жизнь неотъемлемо; смертная казнь в Узбекистане запрещена.', full:'Право на жизнь является неотъемлемым правом каждого человека и охраняется законом. Посягательство на жизнь — тягчайшее преступление. В Республике Узбекистан смертная казнь запрещается.', tags:['жизнь','смертная казнь','права'] },
  { type:'article', num:26, chapter:'VII', summary:'Честь и достоинство неприкосновенны; пытки и насилие запрещены.', full:'Честь и достоинство человека неприкосновенны. Никто не может быть подвергнут пыткам, насилию, жестокому или унижающему обращению. Медицинские опыты без согласия запрещены.', tags:['достоинство','пытки','права'] },
  { type:'article', num:27, chapter:'VII', summary:'Каждый имеет право на свободу; арест допускается только по решению суда (до 48 ч. без суда).', full:'Каждый имеет право на свободу и личную неприкосновенность. Арест и заключение под стражу допускаются только по решению суда. Без решения суда лицо не может быть задержано более 48 часов.', tags:['свобода','арест','задержание'] },
  { type:'article', num:28, chapter:'VII', summary:'Презумпция невиновности; обвиняемый не обязан доказывать свою невиновность.', full:'Лицо считается невиновным, пока его виновность не доказана в суде. Обвиняемому обеспечиваются все возможности для защиты. Подозреваемый не обязан доказывать невиновность и вправе хранить молчание.', tags:['презумпция невиновности','суд','защита'] },
  { type:'article', num:29, chapter:'VII', summary:'Каждый имеет право на квалифицированную юридическую помощь и адвоката.', full:'Каждому гарантируется право на квалифицированную юридическую помощь. Каждое лицо имеет право пользоваться помощью адвоката на любой стадии уголовного процесса. Доказательства, полученные с нарушением закона, не допускаются.', tags:['адвокат','юридическая помощь','суд'] },
  { type:'article', num:30, chapter:'VII', summary:'Нельзя осудить по неопубликованному закону; повторное осуждение за то же преступление запрещено.', full:'Никто не может быть осуждён на основании закона, который официально не опубликован. Никто не может быть повторно осуждён за одно и то же преступление.', tags:['суд','закон','осуждение'] },
  { type:'article', num:31, chapter:'VII', summary:'Право на неприкосновенность частной жизни, тайну переписки и жилища.', full:'Каждый человек имеет право на неприкосновенность частной жизни, личную и семейную тайну. Каждый имеет право на тайну переписки и телефонных переговоров. Каждый имеет право на защиту персональных данных. Обыск допускается только по решению суда.', tags:['частная жизнь','переписка','жилище','данные'] },
  { type:'article', num:32, chapter:'VII', summary:'Право на свободное передвижение по стране и выезд за рубеж.', full:'Каждый, кто законно находится на территории Республики, имеет право на свободное передвижение и выбор места жительства. Каждый имеет право на свободный выезд за пределы Узбекистана. Гражданин вправе беспрепятственно вернуться в Узбекистан.', tags:['передвижение','выезд'] },
  { type:'article', num:33, chapter:'VII', summary:'Свобода мысли, слова и убеждений; право на информацию и доступ к Интернету.', full:'Каждый имеет право на свободу мысли, слова и убеждений, право искать и распространять любую информацию. Государство создаёт условия для доступа к сети Интернет. Ограничение допускается только законом.', tags:['свобода слова','информация','интернет'] },
  { type:'article', num:34, chapter:'VII', summary:'Госорганы обязаны предоставлять гражданам доступ к документам, затрагивающим их права.', full:'Государственные органы и должностные лица обязаны обеспечивать каждому возможность ознакомления с документами, решениями и материалами, затрагивающими его права и законные интересы.', tags:['информация','прозрачность','права'] },
  { type:'article', num:35, chapter:'VII', summary:'Свобода совести; каждый вправе исповедовать любую религию или не исповедовать никакой.', full:'Свобода совести гарантируется для всех. Каждый имеет право исповедовать любую религию или не исповедовать никакой. Принудительное насаждение религиозных взглядов недопустимо.', tags:['религия','совесть','свобода'] },

  { type:'chapter', num:'VIII', title:'Политические права', section:'Права и свободы' },
  { type:'article', num:36, chapter:'VIII', summary:'Граждане участвуют в управлении государством напрямую и через представителей.', full:'Граждане вправе участвовать в управлении делами общества и государства непосредственно и через представителей — путём самоуправления, референдумов и демократического формирования госорганов.', tags:['политические права','участие','управление'] },
  { type:'article', num:37, chapter:'VIII', summary:'Граждане имеют равный доступ к государственной службе.', full:'Граждане Республики Узбекистан имеют равные права на доступ к государственной службе. Ограничения, связанные с прохождением госслужбы, устанавливаются законом.', tags:['государственная служба','равенство'] },
  { type:'article', num:38, chapter:'VIII', summary:'Право на митинги, собрания и демонстрации в соответствии с законом.', full:'Граждане вправе осуществлять свою общественную активность в форме митингов, собраний и демонстраций. Органы власти могут приостанавливать их лишь по обоснованным соображениям безопасности.', tags:['митинги','собрания','права'] },
  { type:'article', num:39, chapter:'VIII', summary:'Право объединяться в профсоюзы, партии и общественные организации.', full:'Граждане вправе объединяться в профессиональные союзы, политические партии и другие общественные объединения. Права оппозиционного меньшинства в партиях не могут ущемляться.', tags:['объединения','партии','профсоюзы'] },
  { type:'article', num:40, chapter:'VIII', summary:'Право обращаться с жалобами и предложениями в государственные органы.', full:'Каждый вправе обращаться с заявлениями, предложениями и жалобами в государственные органы и должностным лицам. Они должны быть рассмотрены в установленные законом сроки.', tags:['жалобы','обращения','права'] },

  { type:'chapter', num:'IX', title:'Экономические, социальные, культурные и экологические права', section:'Права и свободы' },
  { type:'article', num:41, chapter:'IX', summary:'Каждый имеет право на собственность; банковская тайна и наследование гарантируются.', full:'Каждый имеет право на собственность. Тайна банковских операций, вкладов и счетов, а также право наследования гарантируются законом.', tags:['собственность','банк','наследование','экономика'] },
  { type:'article', num:42, chapter:'IX', summary:'Право на достойный труд, справедливую оплату и защиту от безработицы; дискриминация женщин запрещена.', full:'Каждый имеет право на достойный труд, свободный выбор профессии, благоприятные условия труда и справедливое вознаграждение. Запрещается отказывать женщинам в приёме на работу по мотивам беременности.', tags:['труд','работа','зарплата','женщины'] },
  { type:'article', num:43, chapter:'IX', summary:'Государство обеспечивает занятость, защиту от безработицы и профессиональную переподготовку.', full:'Государство принимает меры по обеспечению занятости граждан, защите их от безработицы и сокращению бедности, организует профессиональную подготовку и переподготовку граждан.', tags:['занятость','безработица','бедность'] },
  { type:'article', num:44, chapter:'IX', summary:'Принудительный труд запрещён; любые формы вредного детского труда запрещены.', full:'Запрещается принудительный труд иначе как по решению суда. Запрещаются любые формы детского труда, угрожающие здоровью, безопасности и развитию ребёнка или препятствующие его образованию.', tags:['принудительный труд','детский труд'] },
  { type:'article', num:45, chapter:'IX', summary:'Каждый имеет право на отдых; работающим гарантируется оплачиваемый отпуск.', full:'Каждый имеет право на отдых. Работающим право на отдых обеспечивается установлением рабочего времени, выходных, праздничных дней и оплачиваемого ежегодного трудового отпуска.', tags:['отдых','отпуск','труд'] },
  { type:'article', num:46, chapter:'IX', summary:'Право на социальное обеспечение в старости, при инвалидности и потере кормильца.', full:'Каждый имеет право на социальное обеспечение в старости, при утрате трудоспособности, безработице и потере кормильца. Размеры пенсий и пособий не могут быть ниже минимальных потребительских расходов.', tags:['пенсия','социальное обеспечение','инвалидность'] },
  { type:'article', num:47, chapter:'IX', summary:'Право на жилище; выселение только по суду; государство поощряет строительство жилья.', full:'Каждый имеет право на жилище. Никто не может быть лишён жилища иначе как по решению суда. В случае изъятия жилья собственнику обеспечивается предварительное и равноценное возмещение. Государство поощряет жилищное строительство.', tags:['жилище','жильё','выселение'] },
  { type:'article', num:48, chapter:'IX', summary:'Право на охрану здоровья и медпомощь; часть медуслуг — бесплатно за счёт государства.', full:'Каждый имеет право на охрану здоровья и квалифицированное медицинское обслуживание. Граждане вправе получать гарантированный объём медицинской помощи за счёт государства. Государство создаёт условия для развития физкультуры и здорового образа жизни.', tags:['здоровье','медицина','здравоохранение'] },
  { type:'article', num:49, chapter:'IX', summary:'Право на благоприятную окружающую среду; государство охраняет экологию и Аральский регион.', full:'Каждый имеет право на благоприятную окружающую среду и достоверную информацию о ней. Государство реализует меры по улучшению и охране окружающей среды, принимает меры по восстановлению экосистемы региона Приаралья.', tags:['экология','окружающая среда','Арал'] },
  { type:'article', num:50, chapter:'IX', summary:'Право на образование; общее среднее образование обязательно и бесплатно.', full:'Каждый имеет право на образование. Государство гарантирует бесплатное общее среднее и начальное профессиональное образование. Общее среднее образование является обязательным. Обеспечивается инклюзивное образование для детей с особыми потребностями.', tags:['образование','школа','бесплатно'] },
  { type:'article', num:51, chapter:'IX', summary:'Право на высшее образование на конкурсной основе; вузы имеют академическую свободу.', full:'Граждане вправе получать высшее образование в государственных организациях на конкурсной основе за счёт государства. Высшие учебные заведения имеют право на академическую свободу и самоуправление.', tags:['высшее образование','вуз','конкурс'] },
  { type:'article', num:52, chapter:'IX', summary:'Труд учителя признаётся основой развития общества; государство заботится о педагогах.', full:'Труд учителя признаётся основой развития общества и государства, формирования здорового поколения. Государство заботится о защите чести учителей, их социальном и материальном благополучии.', tags:['учитель','педагог','образование'] },
  { type:'article', num:53, chapter:'IX', summary:'Свобода научного и художественного творчества; интеллектуальная собственность охраняется.', full:'Каждому гарантируется свобода научного, технического и художественного творчества, право пользоваться достижениями культуры. Интеллектуальная собственность охраняется законом.', tags:['творчество','наука','интеллектуальная собственность','культура'] },

  { type:'chapter', num:'X', title:'Гарантии прав и свобод', section:'Права и свободы' },
  { type:'article', num:54, chapter:'X', summary:'Обеспечение прав и свобод человека — высшая цель государства.', full:'Обеспечение прав и свобод человека — высшая цель государства. Государство обеспечивает права и свободы, закреплённые Конституцией и законами.', tags:['права','гарантии','государство'] },
  { type:'article', num:55, chapter:'X', summary:'Гарантируется судебная защита прав; право обратиться в международные органы.', full:'Каждый вправе защищать свои права всеми способами, не запрещёнными законом. Каждому гарантируется судебная защита прав и право обжалования в суд. Каждый вправе обращаться в международные органы по защите прав человека.', tags:['судебная защита','права','международные органы'] },
  { type:'article', num:56, chapter:'X', summary:'Национальные институты по правам человека содействуют гражданскому обществу.', full:'Национальные институты по правам человека дополняют формы защиты прав и свобод, содействуют развитию гражданского общества и повышению культуры прав человека.', tags:['права человека','институты','гражданское общество'] },
  { type:'article', num:57, chapter:'X', summary:'Государство защищает пенсионеров, инвалидов и социально уязвимые категории населения.', full:'Права нетрудоспособных и одиноких престарелых, лиц с инвалидностью и других социально уязвимых категорий находятся под защитой государства. Государство создаёт условия для их полноценного участия в общественной жизни.', tags:['инвалиды','пенсионеры','социальная защита'] },
  { type:'article', num:58, chapter:'X', summary:'Женщины и мужчины имеют равные права во всех сферах жизни.', full:'Женщины и мужчины имеют равные права. Государство обеспечивает равенство прав и возможностей в управлении делами общества и государства, а также в других сферах жизни.', tags:['равенство','женщины','права'] },

  { type:'chapter', num:'XI', title:'Обязанности граждан', section:'Права и свободы' },
  { type:'article', num:59, chapter:'XI', summary:'Все граждане несут обязанности, закреплённые Конституцией.', full:'Все граждане несут обязанности, закреплённые за ними в Конституции.', tags:['обязанности','граждане'] },
  { type:'article', num:60, chapter:'XI', summary:'Обязанность соблюдать Конституцию и уважать права других.', full:'Граждане обязаны соблюдать Конституцию и законы, уважать права, свободы, честь и достоинство других людей.', tags:['обязанности','конституция','закон'] },
  { type:'article', num:61, chapter:'XI', summary:'Обязанность беречь историческое и культурное наследие народа Узбекистана.', full:'Граждане обязаны оберегать историческое, духовное, культурное, научное и природное наследие народа Узбекистана. Наследие охраняется государством.', tags:['обязанности','наследие','культура'] },
  { type:'article', num:62, chapter:'XI', summary:'Обязанность бережно относиться к окружающей природной среде.', full:'Граждане обязаны бережно относиться к окружающей природной среде.', tags:['обязанности','экология','природа'] },
  { type:'article', num:63, chapter:'XI', summary:'Обязанность платить законно установленные налоги и сборы.', full:'Граждане обязаны платить установленные законом налоги и сборы. Налоги должны быть справедливыми и не препятствовать реализации конституционных прав.', tags:['обязанности','налоги','сборы'] },
  { type:'article', num:64, chapter:'XI', summary:'Защита Родины — долг каждого гражданина; военная или альтернативная служба обязательны.', full:'Защита Республики Узбекистан — долг каждого гражданина. Граждане обязаны нести военную или альтернативную службу в порядке, установленном законом.', tags:['обязанности','военная служба','защита'] },

  { type:'chapter', num:'XII', title:'Экономические основы общества', section:'Общество и личность' },
  { type:'article', num:65, chapter:'XII', summary:'Основа экономики — собственность в разных формах; частная собственность неприкосновенна.', full:'Основу экономики Узбекистана составляет собственность в её различных формах. Государство гарантирует свободу экономической деятельности. Частная собственность неприкосновенна; лишить её можно только по решению суда.', tags:['экономика','собственность','предпринимательство'] },
  { type:'article', num:66, chapter:'XII', summary:'Собственник вправе владеть и распоряжаться имуществом, не нарушая прав других.', full:'Собственник по своему усмотрению владеет, пользуется и распоряжается имуществом. Пользование имуществом не должно причинять ущерб среде или нарушать права других лиц.', tags:['собственность','имущество'] },
  { type:'article', num:67, chapter:'XII', summary:'Государство обеспечивает благоприятный инвестиционный климат; монополия ограничивается.', full:'Государство обеспечивает благоприятный инвестиционный и деловой климат. Гарантируется единство экономического пространства и свободное перемещение товаров. Монополистическая деятельность регулируется и ограничивается законом.', tags:['инвестиции','бизнес','монополия','экономика'] },
  { type:'article', num:68, chapter:'XII', summary:'Земля и природные ресурсы — общенациональное богатство; земля может быть в частной собственности.', full:'Земля, её недра, воды, растительный и животный мир — общенациональное богатство, охраняемое государством. Земля может находиться в частной собственности на условиях, предусмотренных законом.', tags:['земля','природные ресурсы','собственность'] },

  { type:'chapter', num:'XIII', title:'Институты гражданского общества', section:'Общество и личность' },
  { type:'article', num:69, chapter:'XIII', summary:'Гражданское общество образуют общественные объединения, СМИ и органы самоуправления.', full:'Институты гражданского общества, в том числе общественные объединения, негосударственные некоммерческие организации, органы самоуправления граждан и СМИ образуют основу гражданского общества.', tags:['гражданское общество','СМИ','НКО'] },
  { type:'article', num:70, chapter:'XIII', summary:'Общественными объединениями признаются профсоюзы, партии, союзы и движения; роспуск — только судом.', full:'В Республике признаются профессиональные союзы, политические партии, общества учёных, женские, молодёжные и другие объединения граждан. Роспуск или запрет их деятельности — только по решению суда.', tags:['объединения','партии','профсоюзы'] },
  { type:'article', num:71, chapter:'XIII', summary:'Запрещены партии и организации, направленные против суверенитета, разжигающие ненависть.', full:'Запрещается создание партий и организаций, имеющих целью насильственное изменение конституционного строя, пропагандирующих войну, национальную или религиозную вражду. Запрещено создание тайных обществ.', tags:['запрет','экстремизм','партии'] },
  { type:'article', num:72, chapter:'XIII', summary:'Государство не вмешивается в деятельность НКО и обеспечивает их равные возможности.', full:'Государство обеспечивает права НКО и создаёт им равные возможности для участия в жизни общества. Взаимное невмешательство государственных органов и НКО в деятельность друг друга.', tags:['НКО','гражданское общество'] },
  { type:'article', num:73, chapter:'XIII', summary:'Профсоюзы защищают социально-экономические права работников; членство — добровольное.', full:'Профессиональные союзы выражают и защищают социально-экономические права и интересы работников. Членство в профессиональных союзах — добровольное.', tags:['профсоюзы','труд','права'] },
  { type:'article', num:74, chapter:'XIII', summary:'Политические партии участвуют в формировании власти и публично отчитываются о финансировании.', full:'Политические партии выражают политическую волю различных социальных слоёв и участвуют в формировании государственной власти. Партии представляют публичные отчёты об источниках финансирования деятельности.', tags:['партии','власть','финансирование'] },
  { type:'article', num:75, chapter:'XIII', summary:'Религиозные организации отделены от государства и равны перед законом.', full:'Религиозные организации отделены от государства и равны перед законом. Государство не вмешивается в деятельность религиозных организаций и гарантирует свободу их деятельности.', tags:['религия','организации','государство'] },

  { type:'chapter', num:'XIV', title:'Семья, дети и молодёжь', section:'Общество и личность' },
  { type:'article', num:76, chapter:'XIV', summary:'Семья — основная ячейка общества; брак основан на традиционных ценностях и свободном согласии.', full:'Семья является основной ячейкой общества и находится под охраной общества и государства. Брак основывается на традиционных семейных ценностях народа Узбекистана, свободном согласии и равноправии вступающих в брак. Государство создаёт социальные, экономические и правовые условия для полноценного развития семьи.', tags:['семья','брак','дети'] },
  { type:'article', num:77, chapter:'XIV', summary:'Родители обязаны содержать и воспитывать детей; государство заботится о сиротах.', full:'Родители и заменяющие их лица обязаны содержать своих детей до совершеннолетия, заботиться об их воспитании, образовании и гармоничном развитии. Государство и общество обеспечивают воспитание детей-сирот и детей без родительской опеки, поощряют благотворительность.', tags:['семья','дети','сироты','воспитание'] },
  { type:'article', num:78, chapter:'XIV', summary:'Дети равны перед законом; материнство, отцовство и детство охраняются государством.', full:'Дети равны перед законом вне зависимости от происхождения и гражданского состояния родителей. Защита прав ребёнка и создание условий для его полноценного развития — обязанность государства. Материнство, отцовство и детство охраняются государством. Государство заботится о воспитании у детей патриотизма и любви к Родине.', tags:['дети','равенство','материнство','патриотизм'] },
  { type:'article', num:79, chapter:'XIV', summary:'Государство защищает права молодёжи и создаёт условия для её развития и трудоустройства.', full:'Государство обеспечивает защиту личных, политических, экономических, социальных и культурных прав молодёжи, поощряет её участие в жизни общества. Государство создаёт условия для интеллектуального, творческого и нравственного развития молодёжи, реализации прав на образование, здоровье, жильё и трудоустройство.', tags:['молодёжь','права','образование','труд'] },
  { type:'article', num:80, chapter:'XIV', summary:'Совершеннолетние трудоспособные дети обязаны заботиться о своих родителях.', full:'Совершеннолетние трудоспособные дети обязаны заботиться о своих родителях.', tags:['обязанности','семья','родители'] },

  { type:'chapter', num:'XV', title:'Средства массовой информации', section:'Общество и личность' },
  { type:'article', num:81, chapter:'XV', summary:'СМИ свободны; государство гарантирует свободу поиска и распространения информации.', full:'Средства массовой информации свободны и действуют в соответствии с законом. Государство гарантирует свободу деятельности СМИ, реализацию ими права на поиск, получение, использование и распространение информации. СМИ несут ответственность за достоверность предоставляемой информации.', tags:['СМИ','свобода слова','информация'] },
  { type:'article', num:82, chapter:'XV', summary:'Цензура не допускается; вмешательство в деятельность СМИ влечёт ответственность.', full:'Цензура не допускается. Воспрепятствование деятельности или вмешательство в деятельность средств массовой информации влечёт ответственность в соответствии с законом.', tags:['СМИ','цензура','свобода слова'] },

  { type:'chapter', num:'XVI', title:'Административно-территориальное устройство', section:'Государственное устройство' },
  { type:'article', num:83, chapter:'XVI', summary:'Узбекистан состоит из областей, районов, городов и Республики Каракалпакстан.', full:'Республика Узбекистан состоит из областей, районов, городов, поселков, кишлаков, аулов, а также Республики Каракалпакстан.', tags:['территория','устройство','Каракалпакстан'] },
  { type:'article', num:84, chapter:'XVI', summary:'Изменение границ областей и образование новых административных единиц — с согласия Олий Мажлиса.', full:'Изменение границ Республики Каракалпакстан, областей, города Ташкента, а также образование или упразднение областей, городов, районов производится с согласия Олий Мажлиса Республики Узбекистан.', tags:['территория','Олий Мажлис','границы'] },

  { type:'chapter', num:'XVII', title:'Республика Каракалпакстан', section:'Государственное устройство' },
  { type:'article', num:85, chapter:'XVII', summary:'Каракалпакстан — суверенная республика в составе Узбекистана; суверенитет охраняется.', full:'Суверенная Республика Каракалпакстан входит в состав Республики Узбекистан. Суверенитет Республики Каракалпакстан охраняется Республикой Узбекистан.', tags:['Каракалпакстан','суверенитет','устройство'] },
  { type:'article', num:86, chapter:'XVII', summary:'Каракалпакстан имеет свою Конституцию, не противоречащую Конституции Узбекистана.', full:'Республика Каракалпакстан имеет свою Конституцию. Конституция Республики Каракалпакстан не может противоречить Конституции Республики Узбекистан.', tags:['Каракалпакстан','конституция'] },
  { type:'article', num:87, chapter:'XVII', summary:'Законы Узбекистана обязательны на всей территории Каракалпакстана.', full:'Законы Республики Узбекистан обязательны и на территории Республики Каракалпакстан.', tags:['Каракалпакстан','закон'] },
  { type:'article', num:88, chapter:'XVII', summary:'Границы Каракалпакстана не изменяются без её согласия; АТУ она решает самостоятельно.', full:'Территория и границы Республики Каракалпакстан не могут быть изменены без её согласия. Республика Каракалпакстан самостоятельно решает вопросы своего административно-территориального устройства.', tags:['Каракалпакстан','границы','самоуправление'] },
  { type:'article', num:89, chapter:'XVII', summary:'Каракалпакстан вправе выйти из состава Узбекистана на основании референдума.', full:'Республика Каракалпакстан обладает правом выхода из состава Республики Узбекистан на основании всеобщего референдума народа Каракалпакстана.', tags:['Каракалпакстан','референдум','выход'] },
  { type:'article', num:90, chapter:'XVII', summary:'Отношения Узбекистана и Каракалпакстана регулируются договорами; споры — через согласительные процедуры.', full:'Взаимные отношения Республики Узбекистан и Республики Каракалпакстан в рамках Конституции регулируются договорами и соглашениями. Споры между ними решаются путём согласительных процедур.', tags:['Каракалпакстан','договор','споры'] },

  // ── РАЗДЕЛ ПЯТЫЙ. ОРГАНИЗАЦИЯ ГОСУДАРСТВЕННОЙ ВЛАСТИ ────────────────────

  { type:'chapter', num:'XVIII', title:'Олий Мажлис Республики Узбекистан', section:'Организация государственной власти' },
  { type:'article', num:91, chapter:'XVIII', summary:'Олий Мажлис — высший представительный орган, осуществляющий законодательную власть; состоит из двух палат.', full:'Высшим государственным представительным органом является Олий Мажлис Республики Узбекистан, осуществляющий законодательную власть. Олий Мажлис состоит из двух палат — Законодательной палаты (нижняя палата) и Сената (верхняя палата). Срок полномочий Законодательной палаты и Сената — пять лет.', tags:['Олий Мажлис','парламент','законодательная власть','Сенат','Законодательная палата'] },
  { type:'article', num:92, chapter:'XVIII', summary:'Законодательная палата — 150 депутатов; Сенат — по 4 от каждого региона плюс 9 назначенных Президентом.', full:'Законодательная палата Олий Мажлиса состоит из ста пятидесяти депутатов, избираемых в соответствии с законом. Сенат является палатой территориального представительства. Члены Сената избираются в равном количестве — по четыре человека — от Республики Каракалпакстан, областей и города Ташкента. Девять членов Сената назначаются Президентом из числа наиболее авторитетных граждан. Депутатом или сенатором может быть гражданин, достигший 25 лет и постоянно проживающий в Узбекистане не менее пяти лет.', tags:['Олий Мажлис','Сенат','Законодательная палата','депутат','выборы'] },
  { type:'article', num:93, chapter:'XVIII', summary:'Совместные полномочия обеих палат: принятие законов, бюджета, ратификация договоров, объявление войны и др.', full:'К совместному ведению палат относятся: принятие Конституции и законов, их изменение; ратификация и денонсация международных договоров; проведение референдума; определение основных направлений внутренней и внешней политики; принятие Государственного бюджета; установление налогов; образование Центральной избирательной комиссии; утверждение указов об объявлении войны, мобилизации, чрезвычайного положения; проведение парламентского расследования и иные полномочия по Конституции.', tags:['Олий Мажлис','полномочия','бюджет','законы','война','мобилизация','налоги','референдум'] },
  { type:'article', num:94, chapter:'XVIII', summary:'Исключительные полномочия Законодательной палаты: контроль бюджета, одобрение Премьер-министра и членов Кабинета.', full:'К исключительным полномочиям Законодательной палаты относятся: контроль за исполнением Государственного бюджета; рассмотрение отчёта Счётной палаты; одобрение кандидатуры Премьер-министра; одобрение кандидатур членов Кабинета Министров; заслушивание докладов Кабинета Министров; направление парламентского запроса; избрание Спикера и председателей комитетов; лишение депутата неприкосновенности. Законодательная палата может самораспуститься большинством не менее двух третей голосов.', tags:['Законодательная палата','полномочия','Премьер-министр','Кабинет Министров','бюджет','Спикер'] },
  { type:'article', num:95, chapter:'XVIII', summary:'Исключительные полномочия Сената: избрание судов, назначение Генпрокурора, амнистия, дипломатические назначения.', full:'К исключительным полномочиям Сената относятся: избрание Конституционного суда, Верховного суда, Высшего судейского совета; одобрение кандидатуры Генерального прокурора и председателя Счётной палаты; назначение руководителей дипломатических представительств; назначение председателя Центрального банка; принятие актов об амнистии; заслушивание отчётов Генпрокурора и руководителей дипломатических представительств; поддержка местных представительных органов. Сенат может самораспуститься большинством не менее двух третей голосов.', tags:['Сенат','полномочия','суд','Генпрокурор','амнистия','дипломатия','Центральный банк'] },
  { type:'article', num:96, chapter:'XVIII', summary:'Порядок заседаний палат: сроки созыва, периодичность, кворум, совместные заседания.', full:'По истечении срока полномочий палаты продолжают работу до начала работы нового созыва. Первые заседания созываются ЦИК: Законодательной палаты — не позднее двух месяцев после выборов, Сената — не позднее месяца после формирования. Сессии Законодательной палаты — с первого рабочего дня сентября по последний рабочий день июня. Сенат заседает не реже трёх раз в год. Кворум — более половины от общего числа депутатов/сенаторов; для конституционных законов — не менее двух третей. Палаты заседают раздельно; совместные заседания — при принесении присяги Президентом, при его важнейших выступлениях и выступлениях руководителей иностранных государств.', tags:['Олий Мажлис','заседания','кворум','сессия','совместное заседание','Сенат','Законодательная палата'] },
  { type:'article', num:97, chapter:'XVIII', summary:'Палаты принимают постановления большинством голосов от общего числа депутатов/сенаторов.', full:'Законодательная палата и Сенат по вопросам, отнесённым к их ведению, принимают постановления. Постановления принимаются большинством голосов от общего числа депутатов Законодательной палаты или членов Сената, за исключением случаев, предусмотренных Конституцией.', tags:['Олий Мажлис','постановления','голосование','Сенат','Законодательная палата'] },
  { type:'article', num:98, chapter:'XVIII', summary:'Право законодательной инициативы: Президент, депутаты, Кабмин, суды, Генпрокурор, Сенат, граждане (100 000).', full:'Право законодательной инициативы принадлежит Президенту, Республике Каракалпакстан, депутатам Законодательной палаты, Кабинету Министров, а также Конституционному суду, Верховному суду и Генеральному прокурору по вопросам их ведения. Законопроекты вносятся в Законодательную палату. Граждане (не менее 100 000), Сенат, Уполномоченный по правам человека (омбудсман) и ЦИК вправе вносить законодательные предложения в Законодательную палату.', tags:['законодательная инициатива','Президент','Сенат','граждане','омбудсман','законопроект'] },
  { type:'article', num:99, chapter:'XVIII', summary:'Порядок принятия закона: Законодательная палата → Сенат → Президент; процедура при отклонении.', full:'Закон приобретает силу после принятия Законодательной палатой, одобрения Сенатом, подписания Президентом и публикации. Принятый закон направляется в Сенат в течение 10 дней. Сенат рассматривает его 60 дней; при одобрении — направляет Президенту. Если Сенат не принял решения — Законодательная палата направляет закон Президенту напрямую. Президент подписывает в течение 60 дней. Отклонённый Сенатом закон возвращается в Законодательную палату; при повторном одобрении двумя третями депутатов — считается принятым. Возможно создание согласительной комиссии. Президент вправе вернуть закон с возражениями; при повторном одобрении двумя третями обеих палат — Президент обязан подписать в течение 14 дней. Публикация законов обязательна.', tags:['закон','законодательный процесс','Президент','Сенат','Законодательная палата','подписание','вето','согласительная комиссия'] },
  { type:'article', num:100, chapter:'XVIII', summary:'Спикер Законодательной палаты: избрание, полномочия, не более двух сроков подряд.', full:'Законодательная палата избирает из своего состава Спикера и его заместителей тайным голосованием большинством голосов на срок полномочий палаты. Одно лицо не может быть Спикером более двух сроков подряд. Досрочный отзыв — более двумя третями голосов. Спикер: созывает и ведёт заседания; руководит подготовкой вопросов; координирует комитеты; организует контроль за исполнением законов; руководит межпарламентскими связями; представляет Законодательную палату; подписывает постановления; издаёт распоряжения.', tags:['Спикер','Законодательная палата','полномочия','выборы','отзыв'] },
  { type:'article', num:101, chapter:'XVIII', summary:'Председатель Сената: избирается по представлению Президента, не более двух сроков подряд.', full:'Сенат избирает Председателя и заместителей тайным голосованием большинством голосов; Председатель — по представлению Президента. Один из заместителей — представитель Каракалпакстана. Одно лицо не может быть Председателем более двух сроков подряд. Досрочный отзыв — более двумя третями голосов. Председатель Сената: созывает и ведёт заседания; руководит подготовкой вопросов; координирует комитеты; контролирует исполнение законов; руководит межпарламентскими связями; представляет Сенат; подписывает постановления; издаёт распоряжения.', tags:['Председатель Сената','Сенат','Президент','Каракалпакстан','выборы','отзыв'] },
  { type:'article', num:102, chapter:'XVIII', summary:'Палаты избирают комитеты для законопроектной работы и контроля; могут создавать комиссии.', full:'Законодательная палата избирает на срок своих полномочий комитеты для законопроектной работы, предварительного рассмотрения вопросов и контроля за исполнением законов. Сенат избирает комитеты для предварительного рассмотрения вопросов и контроля. При необходимости обе палаты могут создавать временные комиссии из своих членов.', tags:['комитеты','комиссии','Законодательная палата','Сенат','контроль'] },
  { type:'article', num:103, chapter:'XVIII', summary:'Парламентское расследование — совместным решением палат; создаётся специальная паритетная комиссия.', full:'В целях изучения фактов, создающих угрозу правам и свободам граждан, интересам общества и государства, совместным решением Законодательной палаты и Сената может проводиться парламентское расследование. Для его проведения на паритетных началах создаётся специальная комиссия из депутатов обеих палат.', tags:['парламентское расследование','комиссия','права','безопасность'] },
  { type:'article', num:104, chapter:'XVIII', summary:'Депутатам и сенаторам возмещаются расходы; постоянные — не вправе вести иную оплачиваемую деятельность. Неприкосновенность.', full:'Депутатам Законодательной палаты и членам Сената возмещаются расходы, связанные с их деятельностью. Работающие на постоянной основе не вправе заниматься иной оплачиваемой деятельностью, кроме научной, творческой и педагогической. Депутат и сенатор пользуются неприкосновенностью: они не могут быть привлечены к уголовной ответственности, задержаны, заключены под стражу или подвергнуты административному взысканию в судебном порядке без согласия соответствующей палаты.', tags:['депутат','сенатор','неприкосновенность','расходы','иммунитет'] },

  { type:'chapter', num:'XIX', title:'Президент Республики Узбекистан', section:'Организация государственной власти' },
  { type:'article', num:105, chapter:'XIX', summary:'Президент — глава государства, обеспечивает согласованное функционирование органов власти.', full:'Президент Республики Узбекистан является главой государства и обеспечивает согласованное функционирование и взаимодействие органов государственной власти.', tags:['Президент','глава государства','государственная власть'] },
  { type:'article', num:106, chapter:'XIX', summary:'Требования к кандидату в Президенты: гражданин, не моложе 35 лет, 10 лет проживания. Срок — 7 лет, не более двух сроков подряд.', full:'Президентом может быть избран гражданин Узбекистана не моложе 35 лет, свободно владеющий государственным языком, постоянно проживающий на территории Узбекистана не менее 10 лет непосредственно перед выборами. Одно и то же лицо не может быть Президентом более двух сроков подряд. Президент избирается на основе всеобщего, равного и прямого избирательного права при тайном голосовании сроком на семь лет.', tags:['Президент','выборы','требования','срок полномочий','гражданство'] },
  { type:'article', num:107, chapter:'XIX', summary:'Президент не вправе занимать иную должность или вести предпринимательскую деятельность; его личность неприкосновенна.', full:'Президент на период исполнения своих обязанностей не может занимать иную оплачиваемую должность, быть депутатом представительного органа, заниматься предпринимательской деятельностью. Личность Президента неприкосновенна и охраняется законом.', tags:['Президент','неприкосновенность','запреты','предпринимательство'] },
  { type:'article', num:108, chapter:'XIX', summary:'Президент вступает в должность с момента принесения присяги на заседании Олий Мажлиса.', full:'Президент считается вступившим в должность с момента принесения на заседании Олий Мажлиса присяги: «Торжественно клянусь верно служить народу Узбекистана, строго следовать Конституции и законам республики, гарантировать права и свободы граждан, добросовестно выполнять возложенные на Президента Республики Узбекистан обязанности».', tags:['Президент','присяга','вступление в должность'] },
  { type:'article', num:109, chapter:'XIX', summary:'25 полномочий Президента: гарант Конституции, дипломатия, назначения, оборона, чрезвычайное положение и др.', full:'Президент: является гарантом прав и свобод граждан, Конституции и законов, суверенитета и территориальной целостности; представляет Узбекистан внутри страны и в международных отношениях; ведёт переговоры и подписывает договоры; принимает дипломатические верительные грамоты; назначает дипломатических представителей (с одобрения Сената); обращается к народу и Олий Мажлису; образует и упраздняет министерства; представляет кандидатуру Председателя Сената; назначает Премьер-министра и членов Кабинета (с одобрения Законодательной палаты); назначает руководителей госорганов; назначает Генпрокурора и председателя Счётной палаты (с одобрения Сената); назначает председателя СГБ (после консультаций с Сенатом); представляет кандидатуры в Конституционный суд, Верховный суд и другие органы; назначает и освобождает председателей областных судов; назначает и освобождает хокимов; приостанавливает и отменяет акты исполнительной власти; подписывает и обнародует законы; объявляет войну и мобилизацию; вводит чрезвычайное положение; является Верховным главнокомандующим; награждает и присваивает звания; решает вопросы гражданства и политического убежища; осуществляет помилование; образует Совет безопасности и Администрацию Президента.', tags:['Президент','полномочия','назначения','дипломатия','оборона','чрезвычайное положение','помилование','гражданство','суды'] },
  { type:'article', num:110, chapter:'XIX', summary:'Президент издаёт указы, постановления и распоряжения, обязательные на всей территории республики.', full:'Президент на основе и во исполнение Конституции и законов Республики Узбекистан издаёт указы, постановления и распоряжения, имеющие обязательную силу на всей территории республики.', tags:['Президент','указы','постановления','распоряжения','нормативные акты'] },
  { type:'article', num:111, chapter:'XIX', summary:'Президент вправе распустить палаты Олий Мажлиса по согласованию с Конституционным судом; новые выборы — в течение трёх месяцев.', full:'Законодательная палата и Сенат могут быть распущены решением Президента по согласованию с Конституционным судом в случае непреодолимых разногласий в их составе или неоднократного принятия неконституционных решений. Новые выборы проводятся в течение трёх месяцев. Роспуск невозможен в период чрезвычайного положения.', tags:['Президент','роспуск','Олий Мажлис','Конституционный суд','чрезвычайное положение','выборы'] },
  { type:'article', num:112, chapter:'XIX', summary:'При невозможности исполнения обязанностей Президента его полномочия временно возлагаются на Председателя Сената; выборы — в течение трёх месяцев.', full:'При невозможности исполнения Президентом своих обязанностей его обязанности и полномочия временно возлагаются на Председателя Сената Олий Мажлиса, с проведением в течение трёх месяцев выборов Президента.', tags:['Президент','исполнение обязанностей','Председатель Сената','временно'] },
  { type:'article', num:113, chapter:'XIX', summary:'Президент, ушедший в отставку по истечении полномочий, пожизненно становится членом Сената.', full:'Президент Республики Узбекистан, ушедший в отставку по истечении своих полномочий, занимает пожизненно должность члена Сената Олий Мажлиса Республики Узбекистан.', tags:['Президент','отставка','Сенат','пожизненно'] },

  { type:'chapter', num:'XX', title:'Кабинет Министров Республики Узбекистан', section:'Организация государственной власти' },
  { type:'article', num:114, chapter:'XX', summary:'Кабинет Министров осуществляет исполнительную власть; состоит из Премьер-министра, его заместителей и министров.', full:'Исполнительную власть осуществляет Кабинет Министров Республики Узбекистан. Кабинет Министров состоит из Премьер-министра, его заместителей и министров; по должности в его состав входит глава правительства Республики Каракалпакстан. Кабинет Министров осуществляет свою деятельность в рамках основных направлений деятельности исполнительной власти, определяемых Президентом.', tags:['Кабинет Министров','исполнительная власть','Премьер-министр','Каракалпакстан'] },
  { type:'article', num:115, chapter:'XX', summary:'12 полномочий Кабмина: экономика, социальная политика, бюджет, экология, молодёжь, гражданское общество, права граждан и др.', full:'Кабинет Министров: несёт ответственность за экономическую, социальную, налоговую и бюджетную политику, развитие науки, культуры, образования и здравоохранения; обеспечивает устойчивый экономический рост, макроэкономическую стабильность, сокращение бедности, продовольственную безопасность и инвестиционный климат; обеспечивает систему социальной защиты, в том числе лиц с инвалидностью; реализует политику в области охраны окружающей среды, борьбы с изменением климата и пандемиями; реализует государственную молодёжную политику, поддерживает семью и традиционные ценности; поддерживает институты гражданского общества; защищает права и законные интересы граждан; обеспечивает исполнение Конституции, законов и актов Президента; координирует органы исполнительной власти; обеспечивает открытость и противодействие коррупции; представляет Законодательной палате ежегодные доклады по социально-экономическим вопросам.', tags:['Кабинет Министров','полномочия','экономика','социальная политика','экология','гражданское общество','коррупция'] },
  { type:'article', num:116, chapter:'XX', summary:'Кабмин издаёт постановления и распоряжения; ответственен перед Олий Мажлисом и Президентом.', full:'Кабинет Министров в пределах Конституции и законодательства издаёт постановления и распоряжения, обязательные для исполнения на всей территории республики. Кабинет Министров ответственен перед Олий Мажлисом и Президентом. Действующий Кабинет Министров слагает полномочия перед вновь избранным Олий Мажлисом, но продолжает работу до формирования нового состава.', tags:['Кабинет Министров','постановления','ответственность','Олий Мажлис','Президент'] },
  { type:'article', num:117, chapter:'XX', summary:'Премьер-министр организует и руководит деятельностью Кабмина, несёт персональную ответственность за его работу.', full:'Премьер-министр: организует и руководит деятельностью Кабинета Министров, несёт персональную ответственность за эффективность его работы; председательствует на заседаниях и подписывает решения Кабмина; представляет Кабинет Министров в международных отношениях; выполняет иные функции, предусмотренные законодательством.', tags:['Премьер-министр','Кабинет Министров','руководство','ответственность','международные отношения'] },
  { type:'article', num:118, chapter:'XX', summary:'Порядок назначения Премьер-министра: консультации с фракциями, одобрение Законодательной палатой, процедура при трёхкратном отклонении.', full:'Кандидатура Премьер-министра представляется Президентом после консультаций со всеми фракциями в течение месяца после формирования палат или освобождения должности. Законодательная палата рассматривает кандидатуру в течение 10 дней; кандидат представляет программу действий Кабмина. Одобрение — более половиной голосов от общего числа депутатов. При трёхкратном отклонении Президент назначает Премьер-министра и вправе распустить Законодательную палату. Члены Кабмина назначаются Президентом после одобрения Законодательной палатой. Президент вправе отправить Премьер-министра или членов Кабмина в отставку. Законодательная палата вправе заслушивать отчёты членов Кабмина и вносить Президенту предложения об их отставке. Члены Кабмина обязаны отвечать на парламентские запросы.', tags:['Премьер-министр','назначение','Законодательная палата','Президент','консультации','отставка','запрос'] },
  { type:'article', num:119, chapter:'XX', summary:'Вотум недоверия Премьер-министру: инициатива одной трети депутатов, принятие двумя третями; весь Кабмин уходит в отставку.', full:'При устойчивых противоречиях между Премьер-министром и Законодательной палатой по предложению не менее одной трети депутатов вопрос о вотуме недоверия вносится на обсуждение Законодательной палаты. Вотум недоверия считается принятым, если за него проголосует не менее двух третей от общего числа депутатов. В этом случае Президент освобождает Премьер-министра от должности, а весь состав Кабинета Министров уходит в отставку.', tags:['вотум недоверия','Премьер-министр','Законодательная палата','отставка','Кабинет Министров'] },
];

const filterTags = {
  rights: ['права','свободы','гарантии','защита','достоинство'],
  economy: ['экономика','собственность','труд','бизнес','инвестиции','предпринимательство'],
  duties: ['обязанности']
};

let activeFilter = 'all';

document.addEventListener('DOMContentLoaded', () => {

// ── MODAL ────────────────────────────────────────────────────────────────────
let modalArticles = [];
let modalIndex = 0;

function openModal(artNum, contextArticles) {
  modalArticles = contextArticles;
  modalIndex = contextArticles.findIndex(a => a.num === artNum);
  renderModal();
  document.getElementById('modal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  document.body.style.overflow = '';
}

function renderModal() {
  const art = modalArticles[modalIndex];
  const ch = data.find(d => d.type === 'chapter' && d.num === art.chapter);
  document.getElementById('modal-chapter').textContent = ch ? `Глава ${ch.num} · ${ch.title}` : '';
  document.getElementById('modal-art-num').textContent = `Статья ${art.num}`;
  document.getElementById('modal-art-summary').textContent = art.summary;
  document.getElementById('modal-art-full').textContent = art.full;
  document.getElementById('modal-tags').innerHTML = (art.tags || []).map(t =>
    `<span class="modal-tag">${t}</span>`).join('');
  document.getElementById('modal-counter').textContent = `${modalIndex + 1} / ${modalArticles.length}`;
  document.getElementById('modal-prev').disabled = modalIndex === 0;
  document.getElementById('modal-next').disabled = modalIndex === modalArticles.length - 1;
}

// ── CHAPTER READER ──────────────────────────────────────────────────────────
function openChapterReader(chNum) {
  const ch = data.find(d => d.type === 'chapter' && d.num === chNum);
  const articles = data.filter(d => d.type === 'article' && d.chapter === chNum);
  if (!ch || !articles.length) return;

  document.getElementById('reader-chapter-title').textContent = ch.title;
  document.getElementById('reader-chapter-num').textContent = `Глава ${ch.num} · ${ch.section || ''}`;
  document.getElementById('reader-toc').innerHTML = articles.map(a =>
    `<div class="reader-toc-item" onclick="scrollToReaderArticle(${a.num})">Ст. ${a.num}</div>`
  ).join('');
  document.getElementById('reader-articles').innerHTML = articles.map(a => `
    <div class="reader-article" id="reader-art-${a.num}">
      <div class="reader-art-num">Статья ${a.num}</div>
      <div class="reader-art-summary">${a.summary}</div>
      <div class="reader-art-full">${a.full}</div>
      <div class="reader-art-tags">${(a.tags || []).map(t => `<span class="modal-tag">${t}</span>`).join('')}</div>
    </div>
  `).join('');

  document.getElementById('reader').classList.add('open');
  document.body.style.overflow = 'hidden';
  document.getElementById('reader-body').scrollTop = 0;
}

window.scrollToReaderArticle = function(num) {
  const el = document.getElementById(`reader-art-${num}`);
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
};

function closeReader() {
  document.getElementById('reader').classList.remove('open');
  document.body.style.overflow = '';
}

// ── SEARCH & RENDER ──────────────────────────────────────────────────────────
function highlight(text, query) {
  if (!query) return text;
  const escaped = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return text.replace(new RegExp(`(${escaped})`, 'gi'), '<mark>$1</mark>');
}

function matches(item, query, filter) {
  const q = query.toLowerCase().trim();
  if (filter === 'chapter' && item.type !== 'chapter') return false;
  if (filter === 'article' && item.type !== 'article') return false;
  if (filter === 'rights' && item.type === 'article') {
    if (!item.tags.some(t => filterTags.rights.some(f => t.includes(f)))) return false;
  }
  if (filter === 'economy' && item.type === 'article') {
    if (!item.tags.some(t => filterTags.economy.some(f => t.includes(f)))) return false;
  }
  if (filter === 'duties' && item.type === 'article') {
    if (!item.tags.some(t => filterTags.duties.some(f => t.includes(f)))) return false;
  }
  if (['rights','economy','duties'].includes(filter) && item.type === 'chapter') return false;
  if (!q) return true;

  const numMatch = q.match(/^(?:ст(?:атья)?\.?\s*)?(\d+)$/i);
  const chapterMatch = q.match(/^(?:глава\s+)?([ivxlcdm]+|\d+)$/i);
  if (numMatch && item.type === 'article') return item.num === parseInt(numMatch[1]);
  if (chapterMatch && item.type === 'chapter') {
    const cn = chapterMatch[1].toUpperCase();
    return item.num === cn || romanToArab(item.num) === parseInt(cn);
  }
  const searchable = [
    item.title || '', item.summary || '', item.full || '',
    (item.tags || []).join(' '),
    item.type === 'article' ? `статья ${item.num}` : `глава ${item.num}`,
  ].join(' ').toLowerCase();
  return searchable.includes(q);
}

function romanToArab(r) {
  const map = {I:1,V:5,X:10,L:50,C:100,D:500,M:1000};
  let n = 0;
  for (let i = 0; i < r.length; i++) {
    const cur = map[r[i]], next = map[r[i+1]];
    n += next && cur < next ? -cur : cur;
  }
  return n;
}

function render(query) {
  const resultsEl = document.getElementById('results');
  const statsEl = document.getElementById('stats');
  const q = query.toLowerCase().trim();
  const filtered = data.filter(item => matches(item, query, activeFilter));
  const articleCount = filtered.filter(i => i.type === 'article').length;

  if (filtered.length === 0) {
    resultsEl.innerHTML = `<div class="no-results"><div class="icon">🔍</div><p>Ничего не найдено по запросу «${query}»</p></div>`;
    statsEl.textContent = '';
    return;
  }

  statsEl.textContent = articleCount > 0 ? `Найдено статей: ${articleCount}` : '';
  const visibleArticles = filtered.filter(i => i.type === 'article');

  let html = '';
  const articles = filtered.filter(i => i.type === 'article');
  const chapters = filtered.filter(i => i.type === 'chapter');

  if (activeFilter === 'chapter') {
    chapters.forEach(ch => {
      const artCount = data.filter(d => d.type === 'article' && d.chapter === ch.num).length;
      html += renderChapterHeader(ch, q, artCount);
    });
  } else if (activeFilter === 'article') {
    articles.forEach(art => { html += renderArticle(art, q); });
  } else {
    let processedChapters = new Set();
    filtered.forEach(item => {
      if (item.type === 'chapter') {
        processedChapters.add(item.num);
        const artCount = data.filter(d => d.type === 'article' && d.chapter === item.num).length;
        html += renderChapterHeader(item, q, artCount);
        if (q) {
          articles.filter(a => a.chapter === item.num).forEach(art => { html += renderArticle(art, q); });
        }
      } else if (item.type === 'article') {
        const ch = data.find(d => d.type === 'chapter' && d.num === item.chapter);
        if (ch && !processedChapters.has(ch.num) && !filtered.find(f => f.type === 'chapter' && f.num === ch.num)) {
          processedChapters.add(ch.num);
          const artCount = data.filter(d => d.type === 'article' && d.chapter === ch.num).length;
          html += renderChapterHeader(ch, '', artCount);
        }
        html += renderArticle(item, q);
      }
    });
  }

  resultsEl.innerHTML = html;

  resultsEl.querySelectorAll('.article-card').forEach(card => {
    card.addEventListener('click', () => {
      const num = parseInt(card.dataset.num);
      const ctx = visibleArticles.length > 0 ? visibleArticles : data.filter(d => d.type === 'article');
      openModal(num, ctx);
    });
  });

  resultsEl.querySelectorAll('.ch-read-btn').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      openChapterReader(btn.dataset.ch);
    });
  });
}

function renderChapterHeader(ch, q, artCount) {
  return `<div class="chapter-header">
    <div class="ch-header-left">
      <div class="ch-num">Глава ${ch.num} · ${artCount} ст.</div>
      <div class="ch-title">${highlight(ch.title, q)}</div>
    </div>
    <button class="ch-read-btn" data-ch="${ch.num}">📖 Читать</button>
  </div>`;
}

function renderArticle(art, q) {
  return `<div class="article-card" data-num="${art.num}">
    <div class="article-top">
      <span class="art-num">Ст. ${art.num}</span>
      <span class="art-summary">${highlight(art.summary, q)}</span>
      <span class="art-open-hint">→</span>
    </div>
  </div>`;
}

// ── EVENT LISTENERS ──────────────────────────────────────────────────────────
const input = document.getElementById('searchInput');
const clearBtn = document.getElementById('clearBtn');

input.addEventListener('input', () => {
  clearBtn.style.display = input.value ? 'block' : 'none';
  render(input.value);
});
clearBtn.addEventListener('click', () => {
  input.value = '';
  clearBtn.style.display = 'none';
  render('');
  input.focus();
});
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    render(input.value);
  });
});

// Modal controls
document.getElementById('modal-prev').addEventListener('click', () => {
  if (modalIndex > 0) { modalIndex--; renderModal(); }
});
document.getElementById('modal-next').addEventListener('click', () => {
  if (modalIndex < modalArticles.length - 1) { modalIndex++; renderModal(); }
});
document.getElementById('modal-close').addEventListener('click', closeModal);
document.getElementById('modal').addEventListener('click', e => {
  if (e.target === document.getElementById('modal')) closeModal();
});

// Reader controls
document.getElementById('reader-close').addEventListener('click', closeReader);

// Keyboard navigation
document.addEventListener('keydown', e => {
  const modalOpen = document.getElementById('modal').classList.contains('open');
  const readerOpen = document.getElementById('reader').classList.contains('open');
  if (e.key === 'Escape') {
    if (readerOpen) { closeReader(); return; }
    if (modalOpen) { closeModal(); return; }
  }
  if (modalOpen) {
    if (e.key === 'ArrowLeft' && modalIndex > 0) { modalIndex--; renderModal(); }
    if (e.key === 'ArrowRight' && modalIndex < modalArticles.length - 1) { modalIndex++; renderModal(); }
  }
});

render('');
});
</script>
</body>
</html>
